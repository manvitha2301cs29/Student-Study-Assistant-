<svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="860" height="520" fill="#ffffff"></rect>

  <!-- Title -->
  <text x="430" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#222">
    Lazy Loading — Topic by Topic
  </text>

  <!-- Step 1 -->
  <circle cx="90" cy="100" r="16" fill="none" stroke="#333"></circle>
  <text x="90" y="105" text-anchor="middle" font-size="11" fill="#333">1</text>

  <rect x="130" y="80" width="320" height="50" rx="8" fill="none" stroke="#333"></rect>
  <text x="290" y="100" text-anchor="middle" font-size="12" fill="#222">Student uploads PDF</text>
  <text x="290" y="118" text-anchor="middle" font-size="10" fill="#555">Vector store created</text>

  <!-- Step 2 -->
  <circle cx="90" cy="180" r="16" fill="none" stroke="#333"></circle>
  <text x="90" y="185" text-anchor="middle" font-size="11" fill="#333">2</text>

  <rect x="130" y="160" width="320" height="50" rx="8" fill="none" stroke="#333"></rect>
  <text x="290" y="180" text-anchor="middle" font-size="12" fill="#222">Agent 1 — Extract all topics</text>
  <text x="290" y="198" text-anchor="middle" font-size="10" fill="#555">Creates topic entries</text>

  <!-- Step 3 -->
  <circle cx="90" cy="260" r="16" fill="none" stroke="#333"></circle>
  <text x="90" y="265" text-anchor="middle" font-size="11" fill="#333">3</text>

  <rect x="130" y="240" width="320" height="50" rx="8" fill="none" stroke="#333"></rect>
  <text x="290" y="260" text-anchor="middle" font-size="12" fill="#222">UI shows all topics</text>
  <text x="290" y="278" text-anchor="middle" font-size="10" fill="#555">Topics appear immediately</text>

  <!-- Topics Panel -->
  <rect x="500" y="220" width="300" height="150" rx="10" fill="none" stroke="#333"></rect>
  <text x="650" y="240" text-anchor="middle" font-size="11" fill="#222">Topics Panel</text>

  <text x="520" y="265" font-size="11" fill="#333">Neural Networks — Ready</text>
  <text x="520" y="285" font-size="11" fill="#333">Backpropagation — Ready</text>
  <text x="520" y="305" font-size="11" fill="#333">Adam Optimizer — Processing</text>
  <text x="520" y="325" font-size="11" fill="#333">Overfitting — Queued</text>
  <text x="520" y="345" font-size="11" fill="#333">Early Stopping — Queued</text>
  <text x="520" y="365" font-size="10" fill="#777">... more topics</text>

  <!-- Step 4 -->
  <circle cx="90" cy="350" r="16" fill="none" stroke="#333"></circle>
  <text x="90" y="355" text-anchor="middle" font-size="11" fill="#333">4</text>

  <rect x="130" y="325" width="320" height="70" rx="8" fill="none" stroke="#333"></rect>
  <text x="290" y="345" text-anchor="middle" font-size="12" fill="#222">Process next topic</text>
  <text x="290" y="365" text-anchor="middle" font-size="10" fill="#555">Web search → Analysis → Synthesis</text>
  <text x="290" y="380" text-anchor="middle" font-size="10" fill="#555">UI refresh and repeat</text>

  <!-- Loop Arrow -->
  <path d="M 90 380 Q 40 410 90 440" stroke="#666" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow)"></path>
  <text x="40" y="410" font-size="9" fill="#666">repeat</text>

  <!-- Step 5 -->
  <circle cx="90" cy="460" r="16" fill="none" stroke="#333"></circle>
  <text x="90" y="465" text-anchor="middle" font-size="11" fill="#333">5</text>

  <rect x="130" y="440" width="320" height="50" rx="8" fill="none" stroke="#333"></rect>
  <text x="290" y="460" text-anchor="middle" font-size="12" fill="#222">All topics completed</text>
  <text x="290" y="478" text-anchor="middle" font-size="10" fill="#555">Final summary stored</text>

  <!-- Chat Box -->
  <rect x="500" y="390" width="300" height="80" rx="10" fill="none" stroke="#333"></rect>
  <text x="650" y="415" text-anchor="middle" font-size="12" fill="#222">Chat always available</text>
  <text x="520" y="440" font-size="11" fill="#555">User can ask questions anytime</text>
  <text x="520" y="460" font-size="11" fill="#555">Handled by Agent 5</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"></polygon>
    </marker>
  </defs>

</svg>